name: log-smasher
# Public image (CasaOS can pull it) + serving content bind-mounted from
# /DATA/AppData/log-smasher — NOT from the project source. CasaOS "uninstall"
# deletes an app's bind-mount source tree, so keeping the source out of the
# mounts protects /DATA/projects/log-smasher. Run ./deploy.sh to (re)sync+install.
services:
  log-smasher:
    image: nginx:alpine
    container_name: log-smasher
    restart: unless-stopped
    ports:
      - "8810:8810"
    volumes:
      - /DATA/AppData/log-smasher/static:/usr/share/nginx/html:ro
      - /DATA/AppData/log-smasher/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      icon: "data:image/svg+xml;base64,"
networks: {}
x-casaos:
  architectures:
    - amd64
  author: self
  developer: self
  category: Tools
  description:
    en_us: Combine many wardriving logs into one WiGLE-uploadable CSV. 100% client-side; optional direct upload to WiGLE.
  tagline:
    en_us: Smash your wardriving logs into one upload.
  title:
    custom: Log Smasher
  icon: "data:image/svg+xml;base64,"
  hostname: 100.102.144.73
  index: /
  port_map: "8810"
  scheme: http
  store_app_id: log-smasher
  is_uncontrolled: false
