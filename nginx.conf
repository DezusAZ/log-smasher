server {
    listen 8810;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # sql.js wasm needs the right mime for streaming compilation
    types {
        text/html                             html htm;
        text/css                              css;
        application/javascript                js;
        application/wasm                      wasm;
        image/svg+xml                         svg;
        text/csv                              csv;
    }

    gzip on;
    gzip_types text/css application/javascript image/svg+xml;

    location / {
        try_files $uri $uri/ =404;
    }
}
